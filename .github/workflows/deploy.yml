name: Deploy Updates to Rocky Linux

on:
  push:
    branches:
      - main

jobs:
  Deploy_Updates:
    runs-on: ubuntu-latest
    steps:
      - name: Conectarse y Actualizar Servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script_stop: true
          script: |
            echo "1. Ingresando a la carpeta principal..."
            cd ~/aescimi
            
            echo "2. Descargando codigo de GitHub..."
            git pull
            
            echo "3. Actualizando e instalando dependencias del Backend..."
            cd backend
            npm install
            
            echo "4. Reiniciando servicio PM2..."
            pm2 restart sena-backend
            
            echo "5. Actualizando e instalando dependencias del Frontend..."
            cd ../frontend
            npm install
            
            echo "6. Compilando diseño web..."
            npm run build
            
            echo "¡Actualizacion aplicada exitosamente!"
