name: Deploy Nodejs App (Frontend & Backend)

on:
  push:
    # Trigger run
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - name: Actualizar Código y Reiniciar Servicios
        run: |
          echo "=== Versiones del entorno ==="
          node -v
          npm -v
          pm2 -v

          # 1. Bajar cambios del repositorio
          echo "=== Actualizando código ==="
          cd ~/aescimi
          git stash || true
          git pull origin main

          # 1.5. Ejecutar Diagnósticos y Servirlos temporalmente
          echo "=== Ejecutando Diagnósticos ==="
          echo "=== DIAGNOSTICS ===" > diagnostics.txt
          echo "Fecha: \$(date)" >> diagnostics.txt
          echo "Usuario: \$(whoami)" >> diagnostics.txt
          
          echo "=== CONECTIVIDAD ===" >> diagnostics.txt
          echo "Ping to DB (192.168.8.164):" >> diagnostics.txt
          ping -c 3 192.168.8.164 >> diagnostics.txt 2>&1 || true
          echo "NC to DB 5432:" >> diagnostics.txt
          nc -zv -w 3 192.168.8.164 5432 >> diagnostics.txt 2>&1 || true
          
          # Instalar sshpass si no está
          echo "Aut0m4t1z4d0r2026%*" | sudo -S apt-get install -y sshpass >/dev/null 2>&1
          
          echo "=== SSH TO DB SERVER ===" >> diagnostics.txt
          sshpass -p "Aut0m4t1z4d0r2026%*" ssh -o StrictHostKeyChecking=no cimi@192.168.8.164 "
            echo '--- Hostname & IP ---'
            hostname -I
            echo '--- PostgreSQL Service Status ---'
            systemctl status postgresql || service postgresql status || true
            echo '--- Listening Ports ---'
            ss -tlnp | grep 5432 || netstat -tlnp | grep 5432 || true
            echo '--- Attempting to start PostgreSQL ---'
            echo 'Aut0m4t1z4d0r2026%*' | sudo -S systemctl start postgresql || echo 'Aut0m4t1z4d0r2026%*' | sudo -S service postgresql start
            echo '--- PostgreSQL Status after start ---'
            systemctl status postgresql || service postgresql status || true
          " >> diagnostics.txt 2>&1 || echo "SSH connection failed" >> diagnostics.txt
          
          # Push diagnostics.txt
          git config --global user.name "SENA Deployer"
          git config --global user.email "deployer@sena.edu.co"
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/luepitar9015-maker/aescimi.git
          git add diagnostics.txt
          git commit -m "chore: diagnostics [skip ci]" || true
          git push origin HEAD:main > push_output.txt 2>&1 || true

          # Crear directorio temporal para servir
          mkdir -p temp_serve
          cp diagnostics.txt temp_serve/diagnostics.txt
          cp push_output.txt temp_serve/push_output.txt || true
          
          # Liberar puerto 3000 y servir temporalmente con Python en segundo plano
          echo "Liberando puerto 3000 con fuerza..."
          pm2 stop sena-backend || true
          pm2 kill || true
          fuser -k -9 3000/tcp || true
          
          echo "Iniciando servidor HTTP temporal en puerto 3000..."
          cd temp_serve
          python3 -m http.server 3000 &
          PYTHON_PID=\$!
          
          # Mantener el servidor HTTP vivo durante 300 segundos (5 minutos)
          sleep 300
          
          # Limpiar
          kill -9 \$PYTHON_PID || true
          cd ..
          rm -rf temp_serve

          # 2. Verificar y liberar el puerto 3000 si está ocupado
          echo "=== Verificando puerto 3000 ==="
          fuser -k 3000/tcp 2>/dev/null && echo "⚠ Puerto 3000 liberado" || echo "✔ Puerto 3000 libre"

          # 3. Actualizar BACKEND (sin SSL — Nginx maneja HTTPS)
          echo "=== Actualizando Backend (HTTP puro) ==="
          cd ~/aescimi/backend
          npm install --omit=dev

          # 4. Actualizar FRONTEND (Vite está en devDependencies, requiere npm install completo)
          echo "=== Actualizando y compilando Frontend ==="
          cd ~/aescimi/frontend
          npm install
          npm run build

          # 5. Configurar API Key de Gemini en el .env del servidor
          echo "=== Configurando Variables de Entorno ==="
          cd ~/aescimi/backend
          touch .env
          if grep -q "^GEMINI_API_KEY=" .env; then
            sed -i 's/^GEMINI_API_KEY=.*/GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}/' .env
          else
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          fi

          # 5.5 Actualizar la clave de Gemini en la base de datos PostgreSQL
          echo "=== Actualizando la clave en la base de datos ==="
          node update_gemini_key.js



          # 6. Reiniciar solo el backend con PM2 (backend sirve el frontend compilado)
          echo "=== Reiniciando PM2 ==="
          cd ~/aescimi
          pm2 restart sena-backend || pm2 start ecosystem.config.js --only sena-backend
          pm2 delete sena-frontend 2>/dev/null || true
          pm2 save

          # 6. Recargar Nginx para asegurar configuración vigente
          echo "=== Recargando Nginx ==="
          sudo nginx -t && sudo systemctl reload nginx || echo "⚠ Revisar configuración de Nginx"

          echo "=== ✅ Deploy completado exitosamente ==="
          echo "=== Backend HTTP en localhost:3000 — Nginx sirve en 80/443 ==="
