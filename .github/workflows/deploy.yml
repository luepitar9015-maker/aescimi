name: Deploy Nodejs App (Frontend & Backend)

on:
  push:
    # Trigger run
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Actualizar Código y Reiniciar Servicios
        run: |
          set +e
          echo "=== Versiones del entorno ==="
          node -v
          npm -v
          pm2 -v

          # 0. Corregir permisos y configurar safe.directory en git
          echo "=== Corrigiendo permisos ==="
          echo "Aut0m4t1z4d0r2026%*" | sudo -S chown -R cimi:cimi /home/cimi/aescimi || true
          git config --global --add safe.directory /home/cimi/aescimi || true
          git config --global --add safe.directory $GITHUB_WORKSPACE || true
          
          # 1. Bajar cambios del repositorio
          echo "=== Actualizando código ==="
          cd /home/cimi/aescimi
          rm -f .git/index.lock || true
          git stash || true
          git clean -fd || true
          git fetch origin main
          git reset --hard origin/main

          # 1.2. Instalar dependencias de sistema para Puppeteer en Linux
          echo "=== Instalando dependencias de Puppeteer ==="
          chmod +x INSTALL_DEPS_LINUX.sh
          echo "Aut0m4t1z4d0r2026%*" | sudo -S ./INSTALL_DEPS_LINUX.sh || echo "⚠ No se pudieron instalar las dependencias de Linux"

          # 1.5. Asegurar que PostgreSQL esté activo en base de datos remota
          echo "=== Verificando y arrancando PostgreSQL en DB Server ==="
          echo "Aut0m4t1z4d0r2026%*" | sudo -S apt-get install -y sshpass >/dev/null 2>&1
          sshpass -p "Aut0m4t1z4d0r2026%*" ssh -o StrictHostKeyChecking=no cimi@192.168.8.164 "
            echo 'Aut0m4t1z4d0r2026%*' | sudo -S systemctl start postgresql || echo 'Aut0m4t1z4d0r2026%*' | sudo -S service postgresql start
          " || echo "⚠ No se pudo verificar PostgreSQL remoto por SSH"

          # 2. Verificar y liberar el puerto 3000 si está ocupado
          echo "=== Verificando puerto 3000 ==="
          fuser -k 3000/tcp 2>/dev/null && echo "⚠ Puerto 3000 liberado" || echo "✔ Puerto 3000 libre"

          # 3. Actualizar BACKEND (sin SSL — Nginx maneja HTTPS)
          echo "=== Actualizando Backend (HTTP puro) ==="
          cd ~/aescimi/backend
          npm install --omit=dev

          # 4. Actualizar FRONTEND (Vite está en devDependencies, requiere npm install completo)
          echo "=== Actualizando y compilando Frontend ==="
          cd ~/aescimi/frontend
          npm install
          npm run build

          # 5. Configurar Variables de Entorno en el .env del servidor
          echo "=== Configurando Variables de Entorno ==="
          cd ~/aescimi/backend
          touch .env
          if grep -q "^GEMINI_API_KEY=" .env; then
            sed -i 's/^GEMINI_API_KEY=.*/GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}/' .env
          else
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          fi
          grep -q "^JWT_SECRET=" .env || echo 'JWT_SECRET=Aut0m4t1z4d0r2026%*SecretKeySuperSeguraSena2026!#' >> .env
          grep -q "^DB_HOST=" .env || echo 'DB_HOST=192.168.8.164' >> .env
          grep -q "^DB_NAME=" .env || echo 'DB_NAME=sena_db' >> .env
          grep -q "^DB_USER=" .env || echo 'DB_USER=cimi' >> .env
          grep -q "^DB_PASSWORD=" .env || echo 'DB_PASSWORD=Aut0m4t1z4d0r2026%*' >> .env
          grep -q "^DB_PORT=" .env || echo 'DB_PORT=5432' >> .env

          # 5.5 Actualizar la clave de Gemini en la base de datos PostgreSQL
          echo "=== Actualizando la clave en la base de datos ==="
          node update_gemini_key.js
          node check_key.js

          # 6. Reiniciar backend y presentación independiente con PM2
          echo "=== Reiniciando PM2 ==="
          cd ~/aescimi
          pm2 restart all || pm2 start ecosystem.config.js
          pm2 delete sena-frontend 2>/dev/null || true
          pm2 save

          # 7. Recargar Nginx para asegurar configuración vigente
          echo "=== Recargando Nginx ==="
          sudo nginx -t && sudo systemctl reload nginx || echo "⚠ Revisar configuración de Nginx"

          # 8. Obtener logs de PM2 para diagnóstico
          echo "=== Diagnostico de Logs de PM2 ==="
          echo '--- PM2 ERROR LOGS ---'
          tail -n 500 /home/cimi/.pm2/logs/sena-backend-error.log 2>/dev/null || true
          echo '--- PM2 OUT LOGS ---'
          tail -n 500 /home/cimi/.pm2/logs/sena-backend-out.log 2>/dev/null || true




