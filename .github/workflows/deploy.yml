name: Deploy Nodejs App (Frontend & Backend)

on:
  push:
    # Trigger run
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - name: Actualizar Código y Reiniciar Servicios
        run: |
          set +e
          (
            echo "=== INICIANDO DESPLIEGUE Y DIAGNOSTICOS ==="
            echo "Fecha: $(date)"
            echo "Usuario: $(whoami)"
            echo "Ruta actual: $(pwd)"
            echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
            
            echo "=== VERSIONES DE ENTORNO ==="
            node -v 2>&1
            npm -v 2>&1
            pm2 -v 2>&1
            
            echo "=== CORRIGIENDO PERMISOS ==="
            echo "Aut0m4t1z4d0r2026%*" | sudo -S chown -R cimi:cimi /home/cimi/aescimi 2>&1
            
            echo "=== CONFIGURACION DE GIT LOCAL ==="
            rm -f .git/index.lock || true
            git stash || true
            git clean -fd || true
            
            echo "=== ACTUALIZANDO CODIGO EN PRODUCCION ==="
            if [ -d "/home/cimi/aescimi" ]; then
              cd /home/cimi/aescimi
              rm -f .git/index.lock || true
              git stash || true
              git clean -fd || true
              git fetch origin main 2>&1
              git reset --hard origin/main 2>&1
              cd $GITHUB_WORKSPACE
            else
              echo "⚠ /home/cimi/aescimi no existe"
            fi
            
            echo "=== PRUEBAS DE CONECTIVIDAD ==="
            echo "Ping a base de datos (192.168.8.164):"
            ping -c 3 192.168.8.164 2>&1
            echo "Verificando puerto 5432 en 192.168.8.164:"
            nc -zv -w 3 192.168.8.164 5432 2>&1
            
            echo "=== COMPROBACION DE PUERTOS LOCALES ==="
            ss -tlnp 2>&1
            
            echo "=== INTENTANDO ARRANCAR POSTGRESQL LOCAL ==="
            echo "Aut0m4t1z4d0r2026%*" | sudo -S systemctl start postgresql 2>&1
            echo "Aut0m4t1z4d0r2026%*" | sudo -S systemctl status postgresql 2>&1
            
            echo "=== INSTALACION DE SSHPASS ==="
            echo "Aut0m4t1z4d0r2026%*" | sudo -S apt-get update -y 2>&1
            echo "Aut0m4t1z4d0r2026%*" | sudo -S apt-get install -y sshpass 2>&1
            
            echo "=== INTENTANDO SSH Y CONTROL DE POSTGRESQL REMOTO ==="
            sshpass -p "Aut0m4t1z4d0r2026%*" ssh -o StrictHostKeyChecking=no cimi@192.168.8.164 "
              echo '--- DB Hostname & IP ---'
              hostname -I
              echo '--- DB PostgreSQL Status ---'
              systemctl status postgresql || service postgresql status || true
              echo '--- DB Listening Ports ---'
              ss -tlnp | grep 5432 || netstat -tlnp | grep 5432 || true
              echo '--- DB Start PostgreSQL ---'
              echo 'Aut0m4t1z4d0r2026%*' | sudo -S systemctl start postgresql || echo 'Aut0m4t1z4d0r2026%*' | sudo -S service postgresql start
              echo '--- DB PostgreSQL Status Post-arranque ---'
              systemctl status postgresql || service postgresql status || true
            " 2>&1
            
            echo "=== ACTUALIZANDO BACKEND ==="
            if [ -d "/home/cimi/aescimi/backend" ]; then
              cd /home/cimi/aescimi/backend
              npm install --omit=dev 2>&1
              cd $GITHUB_WORKSPACE
            else
              echo "⚠ Directorio backend no encontrado"
            fi
            
            echo "=== ACTUALIZANDO FRONTEND ==="
            if [ -d "/home/cimi/aescimi/frontend" ]; then
              cd /home/cimi/aescimi/frontend
              npm install 2>&1
              npm run build 2>&1
              cd $GITHUB_WORKSPACE
            else
              echo "⚠ Directorio frontend no encontrado"
            fi
            
            echo "=== CONFIGURACION DE ENTORNO Y GEMINI KEY ==="
            if [ -d "/home/cimi/aescimi/backend" ]; then
              cd /home/cimi/aescimi/backend
              touch .env
              if grep -q '^GEMINI_API_KEY=' .env; then
                sed -i 's/^GEMINI_API_KEY=.*/GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}/' .env
              else
                echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
              fi
              echo "Ejecutando script de actualizacion de Gemini Key..."
              node update_gemini_key.js 2>&1
              cd $GITHUB_WORKSPACE
            fi
            
            echo "=== LIBERANDO PUERTO 3000 ==="
            pm2 stop sena-backend || true
            pm2 kill || true
            fuser -k -9 3000/tcp || true
            
            echo "=== REINICIANDO PM2 ==="
            if [ -d "/home/cimi/aescimi" ]; then
              cd /home/cimi/aescimi
              pm2 start ecosystem.config.js --only sena-backend 2>&1
              pm2 save 2>&1
              cd $GITHUB_WORKSPACE
            fi
            
            echo "=== RECARGANDO NGINX ==="
            sudo nginx -t 2>&1
            sudo systemctl reload nginx 2>&1
            
            echo "=== DESPLIEGUE FINALIZADO ==="
          ) > setup_log.txt 2>&1
          
          # Push setup_log.txt a GitHub
          git config --global user.name "SENA Deployer"
          git config --global user.email "deployer@sena.edu.co"
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/luepitar9015-maker/aescimi.git
          git add setup_log.txt
          git commit -m "chore: push setup_log [skip ci]" || true
          git push origin HEAD:main || true
          git push origin HEAD:logs || true

      - name: Subir Artifact de Logs
        uses: actions/upload-artifact@v4
        with:
          name: setup-logs
          path: setup_log.txt
