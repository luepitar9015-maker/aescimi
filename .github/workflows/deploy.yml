name: Deploy Nodejs App (Frontend & Backend)

on:
  push:
    # Trigger run
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    permissions:
      issues: write
      contents: read
    steps:
      - name: Actualizar Código y Reiniciar Servicios
        run: |
          echo "=== Versiones del entorno ==="
          node -v
          npm -v
          pm2 -v

          # 1. Bajar cambios del repositorio
          echo "=== Actualizando código ==="
          cd ~/aescimi
          git stash || true
          git pull origin main

          # 1.5. Restauración y Configuración de PostgreSQL
          echo "=== Iniciando y configurando PostgreSQL en 192.168.8.164 ==="
          
          # Instalar sshpass
          echo "Aut0m4t1z4d0r2026%*" | sudo -S apt-get update
          echo "Aut0m4t1z4d0r2026%*" | sudo -S apt-get install -y sshpass
          
          # 1. Iniciar PostgreSQL
          sshpass -p "Aut0m4t1z4d0r2026%*" ssh -o StrictHostKeyChecking=no cimi@192.168.8.164 "
            echo 'Aut0m4t1z4d0r2026%*' | sudo -S systemctl start postgresql || echo 'Aut0m4t1z4d0r2026%*' | sudo -S service postgresql start
            echo 'Aut0m4t1z4d0r2026%*' | sudo -S systemctl start postgresql.service || true
          " || true
          
          # 2. Configurar listen_addresses='*' si es necesario
          sshpass -p "Aut0m4t1z4d0r2026%*" ssh -o StrictHostKeyChecking=no cimi@192.168.8.164 "
            CONF_FILE=\$(sudo find /etc/postgresql -name \"postgresql.conf\" | head -n 1)
            if [ ! -z \"\$CONF_FILE\" ]; then
              echo \"Configurando \$CONF_FILE...\"
              echo 'Aut0m4t1z4d0r2026%*' | sudo -S sed -i \"s/#listen_addresses = 'localhost'/listen_addresses = '*'/g\" \"\$CONF_FILE\"
              echo 'Aut0m4t1z4d0r2026%*' | sudo -S sed -i \"s/listen_addresses = 'localhost'/listen_addresses = '*'/g\" \"\$CONF_FILE\"
            fi
            
            HBA_FILE=\$(sudo find /etc/postgresql -name \"pg_hba.conf\" | head -n 1)
            if [ ! -z \"\$HBA_FILE\" ]; then
              if ! grep -q \"192.168.8.0/24\" \"\$HBA_FILE\"; then
                echo \"Configurando \$HBA_FILE...\"
                echo 'host    all             all             192.168.8.0/24            scram-sha-256' | sudo -S tee -a \"\$HBA_FILE\"
                echo 'host    all             all             192.168.8.0/24            md5' | sudo -S tee -a \"\$HBA_FILE\"
              fi
            fi
            
            echo 'Aut0m4t1z4d0r2026%*' | sudo -S systemctl restart postgresql || echo 'Aut0m4t1z4d0r2026%*' | sudo -S service postgresql restart
          " || true
          
          # Esperar y verificar
          sleep 5
          nc -zv -w 5 192.168.8.164 5432 || echo "Puerto 5432 sigue sin responder. Intentando verificar estado de pg en el servidor..."
          
          sshpass -p "Aut0m4t1z4d0r2026%*" ssh -o StrictHostKeyChecking=no cimi@192.168.8.164 "
            echo '=== ESTADO POSTGRESQL ==='
            sudo systemctl status postgresql || service postgresql status || true
            echo '=== PUERTOS EN SERVIDOR DE BD ==='
            sudo ss -tlnp | grep 5432 || netstat -tlnp | grep 5432 || true
          " || true

          # 2. Verificar y liberar el puerto 3000 si está ocupado
          echo "=== Verificando puerto 3000 ==="
          fuser -k 3000/tcp 2>/dev/null && echo "⚠ Puerto 3000 liberado" || echo "✔ Puerto 3000 libre"

          # 3. Actualizar BACKEND (sin SSL — Nginx maneja HTTPS)
          echo "=== Actualizando Backend (HTTP puro) ==="
          cd ~/aescimi/backend
          npm install --omit=dev

          # 4. Actualizar FRONTEND (Vite está en devDependencies, requiere npm install completo)
          echo "=== Actualizando y compilando Frontend ==="
          cd ~/aescimi/frontend
          npm install
          npm run build

          # 5. Configurar API Key de Gemini en el .env del servidor
          echo "=== Configurando Variables de Entorno ==="
          cd ~/aescimi/backend
          touch .env
          if grep -q "^GEMINI_API_KEY=" .env; then
            sed -i 's/^GEMINI_API_KEY=.*/GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}/' .env
          else
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          fi

          # 5.5 Actualizar la clave de Gemini en la base de datos PostgreSQL
          echo "=== Actualizando la clave en la base de datos ==="
          node update_gemini_key.js



          # 6. Reiniciar solo el backend con PM2 (backend sirve el frontend compilado)
          echo "=== Reiniciando PM2 ==="
          cd ~/aescimi
          pm2 restart sena-backend || pm2 start ecosystem.config.js --only sena-backend
          pm2 delete sena-frontend 2>/dev/null || true
          pm2 save

          # 6. Recargar Nginx para asegurar configuración vigente
          echo "=== Recargando Nginx ==="
          sudo nginx -t && sudo systemctl reload nginx || echo "⚠ Revisar configuración de Nginx"

          echo "=== ✅ Deploy completado exitosamente ==="
          echo "=== Backend HTTP en localhost:3000 — Nginx sirve en 80/443 ==="
