name: Deploy Updates to Rocky Linux

on:
  push:
    branches:
      - main

jobs:
  Deploy_Updates:
    runs-on: self-hosted
    steps:
      - name: Actualizando Servidor Directamente (Modo Local)
        run: |
          echo "==== Actualizando servidor de forma directa y silenciosa ===="
          cd /home/cimi/aescimi
          
          echo "1. Bajando los ultimos cambios de codigo..."
          git pull origin main
          
          echo "2. Ejecutando el proceso de configuracion desatendido..."
          chmod +x ACTUALIZAR_DESDE_GITHUB_LINUX.sh
          ./ACTUALIZAR_DESDE_GITHUB_LINUX.sh
          
          echo "¡Actualizacion aplicada exitosamente desde tu propia red!"
