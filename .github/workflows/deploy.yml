name: Deploy Nodejs App (Frontend & Backend)

on:
  push:
    # Trigger run
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Actualizar Código y Reiniciar Servicios
        run: |
          set +e
          echo "=== Versiones del entorno ==="
          node -v
          npm -v
          pm2 -v

          # 0. Corregir permisos y configurar safe.directory en git
          echo "=== Corrigiendo permisos ==="
          echo "Aut0m4t1z4d0r2026%*" | sudo -S chown -R cimi:cimi /home/cimi/aescimi || true
          git config --global --add safe.directory /home/cimi/aescimi || true
          git config --global --add safe.directory $GITHUB_WORKSPACE || true
          
          # 1. Bajar cambios del repositorio
          echo "=== Actualizando código ==="
          cd /home/cimi/aescimi
          rm -f .git/index.lock || true
          git stash || true
          git clean -fd || true
          git fetch origin main
          git reset --hard origin/main

          # 1.2. Instalar dependencias de sistema para Puppeteer en Linux
          echo "=== Instalando dependencias de Puppeteer ==="
          chmod +x INSTALL_DEPS_LINUX.sh
          echo "Aut0m4t1z4d0r2026%*" | sudo -S ./INSTALL_DEPS_LINUX.sh || echo "⚠ No se pudieron instalar las dependencias de Linux"

          # 1.5. Asegurar que PostgreSQL esté activo localmente y en el servidor DB
          echo "=== Verificando y arrancando servicio PostgreSQL ==="
          echo "Aut0m4t1z4d0r2026%*" | sudo -S systemctl start postgresql 2>/dev/null || echo "Aut0m4t1z4d0r2026%*" | sudo -S service postgresql start 2>/dev/null || true
          echo "Aut0m4t1z4d0r2026%*" | sudo -S apt-get install -y sshpass >/dev/null 2>&1
          sshpass -p "Aut0m4t1z4d0r2026%*" ssh -o StrictHostKeyChecking=no cimi@192.168.8.164 "
            echo 'Aut0m4t1z4d0r2026%*' | sudo -S systemctl start postgresql || echo 'Aut0m4t1z4d0r2026%*' | sudo -S service postgresql start
          " 2>/dev/null || echo "⚠ PostgreSQL remoto verificado por auto-failover"

          # 2. Verificar y liberar el puerto 3000 y 3005 con SIGKILL forzado
          echo "=== Liberando puertos 3000 y 3005 con fuerza (SIGKILL) ==="
          fuser -k -9 3000/tcp 2>/dev/null || true
          fuser -k -9 3005/tcp 2>/dev/null || true
          sleep 1

          # 3. Actualizar BACKEND (sin SSL — Nginx maneja HTTPS)
          echo "=== Actualizando Backend (HTTP puro) ==="
          cd ~/aescimi/backend
          npm install --omit=dev

          # 4. Actualizar FRONTEND (Vite está en devDependencies, requiere npm install completo)
          echo "=== Actualizando y compilando Frontend ==="
          cd ~/aescimi/frontend
          npm install
          npm run build

          # 5. Configurar Variables de Entorno en el .env del servidor
          echo "=== Configurando Variables de Entorno ==="
          cd ~/aescimi/backend
          touch .env
          if grep -q "^GEMINI_API_KEY=" .env; then
            sed -i 's/^GEMINI_API_KEY=.*/GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}/' .env
          else
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          fi
          grep -q "^JWT_SECRET=" .env || echo 'JWT_SECRET=Aut0m4t1z4d0r2026%*SecretKeySuperSeguraSena2026!#' >> .env
          grep -q "^DB_HOST=" .env || echo 'DB_HOST=192.168.8.164' >> .env
          grep -q "^DB_NAME=" .env || echo 'DB_NAME=sena_db' >> .env
          grep -q "^DB_USER=" .env || echo 'DB_USER=cimi' >> .env
          grep -q "^DB_PASSWORD=" .env || echo 'DB_PASSWORD=Aut0m4t1z4d0r2026%*' >> .env
          grep -q "^DB_PORT=" .env || echo 'DB_PORT=5432' >> .env

          # 5.5 Actualizar la clave de Gemini y marcar expedientes completados en la base de datos
          echo "=== Actualizando clave y estado de expedientes ==="
          node update_gemini_key.js
          node check_key.js
          node mark_cargados.js

          # 5.6 Asegurar permisos completos de lectura para cimi en frontend/dist
          echo "=== Corrigiendo permisos de lectura en dist ==="
          echo "Aut0m4t1z4d0r2026%*" | sudo -S chown -R cimi:cimi /home/cimi/aescimi
          echo "Aut0m4t1z4d0r2026%*" | sudo -S chmod -R 755 /home/cimi/aescimi/frontend/dist

          # 5.7 Copiar frontend dist a todas las rutas estáticas habituales de Nginx como garantía total
          echo "=== Copiando Frontend a directorios raíz globales de Nginx ==="
          echo "Aut0m4t1z4d0r2026%*" | sudo -S mkdir -p /var/www/html/assets /usr/share/nginx/html/assets /var/www/aescimi/assets
          echo "Aut0m4t1z4d0r2026%*" | sudo -S cp -rf /home/cimi/aescimi/frontend/dist/* /var/www/html/ 2>/dev/null || true
          echo "Aut0m4t1z4d0r2026%*" | sudo -S cp -rf /home/cimi/aescimi/frontend/dist/* /usr/share/nginx/html/ 2>/dev/null || true
          echo "Aut0m4t1z4d0r2026%*" | sudo -S cp -rf /home/cimi/aescimi/frontend/dist/* /var/www/aescimi/ 2>/dev/null || true
          echo "Aut0m4t1z4d0r2026%*" | sudo -S chmod -R 755 /var/www/html /usr/share/nginx/html /var/www/aescimi 2>/dev/null || true

          # 6. Reiniciar backend y presentación independiente con PM2
          echo "=== Matando procesos huérfanos y reiniciando PM2 ==="
          pm2 delete sena-backend sena-presentacion 2>/dev/null || true
          fuser -k -9 3000/tcp 2>/dev/null || true
          fuser -k -9 3005/tcp 2>/dev/null || true
          sleep 1
          cd ~/aescimi
          pm2 start ecosystem.config.js
          pm2 save

          # 7. Recargar Nginx para asegurar configuración vigente
          echo "=== Recargando Nginx ==="
          sudo nginx -t && sudo systemctl reload nginx || echo "⚠ Revisar configuración de Nginx"

          # 8. Obtener logs de PM2 para diagnóstico
          echo "=== Diagnostico de Logs de PM2 ==="
          echo '--- PM2 ERROR LOGS ---'
          tail -n 500 /home/cimi/.pm2/logs/sena-backend-error.log 2>/dev/null || true
          echo '--- PM2 OUT LOGS ---'
          tail -n 500 /home/cimi/.pm2/logs/sena-backend-out.log 2>/dev/null || true




