<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        sena: {
                            green: '#39A900',
                            dark: '#0B2F00',
                            glow: 'rgba(57, 169, 0, 0.4)',
                        },
                        darkbg: '#050811',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #03060d;
            color: #e2e8f0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        
        .glass-panel {
            background: rgba(10, 17, 34, 0.65);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
        }
        
        .glass-card {
            background: rgba(15, 23, 42, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card:hover {
            border-color: rgba(57, 169, 0, 0.25);
            background: rgba(15, 23, 42, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(57, 169, 0, 0.06);
        }
        
        @keyframes laser-move {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
        .laser-line {
            animation: laser-move 2s ease-in-out infinite;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(40px, -60px) scale(1.1); }
            66% { transform: translate(-30px, 30px) scale(0.95); }
        }
        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
            animation: drift 18s ease-in-out infinite;
        }

        @keyframes cursor-blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
        .caret-blink {
            animation: cursor-blink 0.9s infinite;
        }

        .slide-enter-active {
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(15px) scale(0.99);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .custom-scroll::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.15);
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(57,169,0,0.3);
        }

        @keyframes vibrate {
            0%, 100% { transform: rotate(0deg); }
            10%, 30%, 50%, 70%, 90% { transform: rotate(-1.5deg); }
            20%, 40%, 60%, 80% { transform: rotate(1.5deg); }
        }
        .phone-vibrate {
            animation: vibrate 0.5s linear infinite;
        }
    </style>
</head>
<body class="antialiased overflow-hidden select-none">

    <!-- BACKGROUND NEON GLOWS -->

    <!-- MAIN APP STRUCTURE -->

        <!-- VIEWPORT -->

            </div>
        </main>

        <!-- FOOTER -->
        <footer class="flex justify-between items-center border-t border-white/5 pt-3">
            <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest font-outfit">
                Estrategia 180 / SENA
            </div>

            <!-- Controls -->
            <div class="flex items-center gap-4 bg-slate-950/80 border border-white/10 px-5 py-1.5 rounded-full shadow-2xl">
                <button onclick="prevSlide()" class="p-1.5 text-slate-400 hover:text-white disabled:opacity-20 transition-all" id="prevBtn">

                Teclas [←] y [→] para navegar. Tecla [N] para notas.
            </div>
        </div>
    </div>

    <!-- MAIN SLIDE DATABASE -->

        };

        let selectedSimDocId = 'peticion';
        let simStep = 0; // 0: Idle, 1: Scanning, 2: Login SSO, 3: MFA, 4: RPA Typing, 5: Done
        let simLogs = [];
        let mfaApproved = false;

        function selectSimDoc(docId) {
            if (simStep > 0 && simStep < 5) return;
            
            selectedSimDocId = docId;
            
            ['peticion', 'contrato', 'resolucion'].forEach(d => {
                const btn = document.getElementById("btnSim_" + d);
                const lbl = document.getElementById("lblSim_" + d);
                if (btn && lbl) {
                    if (d === docId) {
                        btn.className = "text-left p-2.5 rounded-xl border border-sena-green/30 bg-slate-900 text-xs transition-all font-mono";
                        lbl.className = "text-white font-bold";
                    } else {
                        btn.className = "text-left p-2.5 rounded-xl border border-white/5 bg-slate-950 text-xs transition-all font-mono";
                        lbl.className = "text-slate-400";
                    }
                }
            });

            simStep = 0;
            mfaApproved = false;
            drawSimCanvas();
            document.getElementById("simLogs").innerHTML = `<span class="text-slate-650 italic block text-center pt-24">Consola inactiva. Seleccionado: ${MOCK_DOCS[selectedSimDocId].title}</span>`;
        }

        function logToSimConsole(msg, type = 'info') {
            const logsBox = document.getElementById("simLogs");
            if (!logsBox) return;
            
            let color = 'text-slate-400';
            if (type === 'ia') color = 'text-green-400 font-semibold';
            else if (type === 'rpa') color = 'text-cyan-400';
            else if (type === 'mfa') color = 'text-yellow-400 animate-pulse';
            else if (type === 'ok') color = 'text-emerald-400 font-bold';

            simLogs.push(`<div class="${color} text-[10px]"><span class="text-slate-700 mr-1.5">&gt;</span>${msg}</div>`);
            logsBox.innerHTML = simLogs.join('');
            logsBox.scrollTop = logsBox.scrollHeight;
        }

        function drawSimCanvas() {
            const canvas = document.getElementById("simCanvas");
            if (!canvas) return;

            const doc = MOCK_DOCS[selectedSimDocId];

            if (simStep === 0) {
                canvas.innerHTML = `
                    <div class="text-center space-y-3 animate-fade-in">
                        <div class="w-12 h-12 rounded-full bg-slate-900 border border-white/5 flex items-center justify-center text-xl text-sena-green mx-auto">🤖</div>
                        <h5 class="text-xs font-bold text-slate-300">Simulador Listo</h5>
                        <p class="text-[10px] text-slate-500 max-w-xs mx-auto">Preparado para indexar: <strong>${doc.title}</strong>.<br>Haga clic en "Iniciar Simulación" para comenzar.</p>
                    </div>
                `;
                document.getElementById("simGlowLed").className = "w-2.5 h-2.5 rounded-full bg-slate-600";
            }
            else if (simStep === 1) {
                canvas.innerHTML = `
                    <div class="w-full h-full flex flex-col justify-center items-center space-y-3 p-4 animate-fade-in">
                        <div class="w-36 h-40 bg-slate-900 border border-white/10 rounded-xl p-3 relative overflow-hidden shadow-2xl flex flex-col justify-between">
                            <div class="absolute top-0 left-0 w-full h-0.5 bg-green-400 shadow-[0_0_8px_#4ade80] laser-line"></div>
                            
                            <div class="space-y-1">
                                <div class="h-2 w-1/3 bg-slate-750 rounded"></div>
                                <div class="h-1 w-full bg-slate-800 rounded"></div>
                                <div class="h-1 w-5/6 bg-slate-800 rounded"></div>
                            </div>
                            
                            <div class="space-y-1">
                                <div class="text-[7px] text-sena-green font-bold truncate">✓ ${doc.solicitante}</div>
                                <div class="text-[7px] text-cyan-400 font-bold truncate">✓ CC/NIT: ${doc.cedula}</div>
                            </div>
                        </div>
                        <span class="text-[10px] font-black text-sena-green bg-sena-green/10 px-2.5 py-0.5 rounded-full uppercase tracking-wider">Escaneo Cognitivo por IA</span>
                    </div>
                `;
                document.getElementById("simGlowLed").className = "w-2.5 h-2.5 rounded-full bg-sena-green animate-pulse";
            }
            else if (simStep === 2) {
                canvas.innerHTML = `
                    <div class="w-full h-full flex flex-col justify-center items-center p-3 animate-fade-in">
                        <div class="w-full max-w-[240px] bg-white text-slate-800 rounded-xl p-3.5 shadow-2xl border border-slate-200 text-[9px] space-y-2">
                            <div class="text-center font-bold text-slate-700">Autenticación Microsoft SSO</div>
                            
                            <div class="space-y-1 text-left font-mono">
                                <div>
                                    <label class="text-[7px] font-bold text-slate-400">Usuario:</label>
                                    <div class="bg-slate-50 border border-slate-200 p-1 rounded min-h-[18px] text-slate-755 font-bold" id="simEmailBox"></div>
                                </div>
                                <div>
                                    <label class="text-[7px] font-bold text-slate-400">Clave:</label>
                                    <div class="bg-slate-50 border border-slate-200 p-1 rounded min-h-[18px] text-slate-755 font-bold" id="simPassBox"></div>
                                </div>
                            </div>
                        </div>
                        <span class="block text-[8px] text-slate-400 mt-2 font-bold uppercase">Robot digitando credenciales...</span>
                    </div>
                `;
            }
            else if (simStep === 3) {
                canvas.innerHTML = `
                    <div class="w-full h-full flex flex-col justify-center items-center p-3 animate-fade-in">
                        <div class="flex gap-4 items-center">
                            
                            <!-- Browser Locked -->
                            <div class="w-24 h-20 bg-slate-900 border border-white/10 rounded-lg p-2 flex flex-col justify-between opacity-50 text-[6px]">
                                <div class="h-1 bg-red-500/25 rounded w-1/2"></div>
                                <div class="bg-yellow-500/20 border border-yellow-500/30 rounded p-1 text-center font-bold text-yellow-400 text-[6px]">
                                    SSO MFA LOCK
                                </div>
                            </div>
                            
                            <div class="text-slate-600 font-bold animate-pulse text-[10px]">➔</div>
                            
                            <!-- Simulated Mobile Phone -->
                            <div class="w-28 h-44 bg-slate-900 border border-white/20 rounded-xl p-2 relative shadow-2xl flex flex-col justify-between ${!mfaApproved ? 'phone-vibrate' : ''}">
                                <div class="w-6 h-1 bg-slate-950 rounded-full mx-auto mb-1"></div>
                                
                                <div class="bg-slate-950 border border-white/5 rounded-lg p-2 flex-grow flex flex-col justify-between text-center space-y-1 text-[8px]">
                                    <div class="space-y-0.5">
                                        <span class="bg-yellow-500/10 text-yellow-400 border border-yellow-500/20 px-1 py-0.5 rounded-full font-bold uppercase text-[5px]">MFA</span>
                                        <span class="block font-black text-slate-300">¿Aprobar Acceso?</span>
                                    </div>
                                    
                                    ${!mfaApproved ? `
                                        <button onclick="approveSimMfa()" class="bg-sena-green hover:bg-emerald-600 text-white font-black py-1 px-1.5 rounded cursor-pointer transition-all active:scale-95 text-[7px] w-full">
                                            ✓ SI, APROBAR
                                        </button>
                                    ` : `
                                        <div class="bg-emerald-950/30 border border-emerald-500/20 text-emerald-400 font-black py-0.5 rounded">
                                            ✓ VALIDADO
                                        </div>
                                    `}
                                </div>
                            </div>

                        </div>
                        <span class="block text-[8px] text-yellow-400 font-bold animate-pulse mt-3 text-center">
                            ${!mfaApproved ? 'HAGA CLIC EN "SI, APROBAR" EN EL CELULAR SIMULADO' : 'Autorización confirmada...'}
                        </span>
                    </div>
                `;
                document.getElementById("simGlowLed").className = "w-2.5 h-2.5 rounded-full bg-yellow-500 animate-pulse";
            }
            else if (simStep === 4) {
                canvas.innerHTML = `
                    <div class="w-full h-full flex flex-col justify-center items-center p-3 animate-fade-in">
                        <div class="w-full bg-slate-900 border border-white/10 rounded-xl p-3 shadow-2xl text-[8px] space-y-2">
                            <div class="bg-slate-950 border-b border-white/5 p-1 flex justify-between items-center font-mono text-[7px]">
                                <span class="text-slate-400 font-bold">ECM FORMULARIO INSTITUCIONAL</span>
                                <span class="text-cyan-400 font-bold animate-pulse">DIGITANDO...</span>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-1.5 text-left font-mono">
                                <div>
                                    <span class="text-[6.5px] text-slate-500 block font-bold">EXPEDIENTE:</span>
                                    <div class="bg-slate-950 border border-white/5 p-0.5 rounded font-bold text-slate-300 truncate">${doc.expediente}</div>
                                </div>
                                <div>
                                    <span class="text-[6.5px] text-slate-500 block font-bold">TIPOLOGÍA TRD:</span>
                                    <div class="bg-slate-950 border border-sena-green/30 p-0.5 rounded font-bold text-sena-green truncate">${doc.type}</div>
                                </div>
                                <div>
                                    <span class="text-[6.5px] text-slate-500 block font-bold">TITULAR:</span>
                                    <div class="bg-slate-950 border border-white/5 p-0.5 rounded font-bold text-slate-300 truncate">${doc.solicitante}</div>
                                </div>
                                <div>
                                    <span class="text-[6.5px] text-slate-500 block font-bold">DOCUMENTO:</span>
                                    <div class="bg-slate-950 border border-white/5 p-0.5 rounded font-bold text-slate-300 truncate">${doc.cedula}</div>
                                </div>
                            </div>
                            
                            <div class="space-y-1 border-t border-white/5 pt-2 text-left">
                                <div class="flex justify-between text-[7px] text-slate-450 font-bold">
                                    <span class="truncate">Cargando: ${doc.title}</span>
                                    <span id="simUploadPerc">0%</span>
                                </div>
                                <div class="w-full bg-slate-950 h-1 rounded-full overflow-hidden">
                                    <div class="bg-sena-green h-full w-0 transition-all duration-100" id="simUploadBar"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById("simGlowLed").className = "w-2.5 h-2.5 rounded-full bg-cyan-400 animate-pulse";
            }
            else if (simStep === 5) {
                canvas.innerHTML = `
                    <div class="w-full h-full flex flex-col justify-center items-center space-y-2 p-4 animate-fade-in">
                        <div class="w-10 h-10 rounded-full bg-emerald-500/10 border border-emerald-500/25 text-emerald-400 flex items-center justify-center text-lg font-bold shadow shadow-emerald-500/5">✓</div>
                        <h5 class="text-xs font-black text-emerald-400 font-outfit uppercase tracking-wide">Radicación Finalizada</h5>
                        
                        <div class="bg-slate-900 border border-white/5 rounded-xl p-2.5 text-left w-full text-[9px] leading-relaxed">
                            <span class="text-sena-green font-bold uppercase tracking-wider block">Hoja de Control Digital:</span>
                            <p class="text-slate-400 font-mono">"${doc.type} clasificado en expediente ${doc.expediente} (${doc.solicitante}). Metadatos mapeados y validados con 0% de error de digitación."</p>
                        </div>
                    </div>
                `;
                document.getElementById("simGlowLed").className = "w-2.5 h-2.5 rounded-full bg-emerald-500";
            }
        }

        function runSimulation() {
            if (simStep > 0) return;
            
            const doc = MOCK_DOCS[selectedSimDocId];
            simLogs = [];
            simStep = 1;
            drawSimCanvas();

            logToSimConsole(`[IA] Iniciando escaneo de documento: ${doc.title}...`, 'ia');
            logToSimConsole(`[IA] Extrayendo metadatos cognitivos (Gemini OCR)...`, 'ia');

            setTimeout(() => {
                simStep = 2;
                drawSimCanvas();
                logToSimConsole(`[IA] TRD detectada: ${doc.type} (Confianza: ${doc.confidence})`, 'ia');
                logToSimConsole(`[IA] Titular: ${doc.solicitante} | ID: ${doc.cedula}`, 'ia');
                logToSimConsole(`[RPA] Iniciando Puppeteer. Abriendo portal corporativo Microsoft SSO...`, 'rpa');

                typeEmailAndPass();
            }, 2000);
        }

        function typeEmailAndPass() {
            const email = 'orador.sena@sena.edu.co';
            const emailBox = document.getElementById("simEmailBox");
            const passBox = document.getElementById("simPassBox");
            
            let i = 0;
            const emailInterval = setInterval(() => {
                if (i < email.length) {
                    if (emailBox) emailBox.innerText = email.substring(0, i + 1) + '|';
                    i++;
                } else {
                    clearInterval(emailInterval);
                    if (emailBox) emailBox.innerText = email;
                    
                    logToSimConsole(`[RPA] Escribiendo contraseña institucional en login...`, 'rpa');
                    let j = 0;
                    const passInterval = setInterval(() => {
                        if (j < 12) {
                            if (passBox) passBox.innerText = '*'.repeat(j + 1) + '|';
                            j++;
                        } else {
                            clearInterval(passInterval);
                            if (passBox) passBox.innerText = '************';
                            
                            setTimeout(() => {
                                simStep = 3;
                                mfaApproved = false;
                                drawSimCanvas();
                                logToSimConsole(`[RPA] Credenciales correctas. Bloqueado por control de MFA.`, 'mfa');
                                logToSimConsole(`[MFA] Esperando confirmación remota en dispositivo del usuario...`, 'mfa');
                            }, 500);
                        }
                    }, 30);
                }
            }, 25);
        }

        function approveSimMfa() {
            mfaApproved = true;
            drawSimCanvas();
            logToSimConsole(`[MFA] Acceso aprobado en celular del orador.`, 'ok');
            logToSimConsole(`[RPA] Autenticación completada. Entrando al Gestor ECM...`, 'rpa');

            setTimeout(() => {
                simStep = 4;
                drawSimCanvas();
                logToSimConsole(`[RPA] Diligenciando formulario para el expediente: ${MOCK_DOCS[selectedSimDocId].expediente}`, 'rpa');
                logToSimConsole(`[RPA] Inyectando tipología TRD -> ${MOCK_DOCS[selectedSimDocId].type}`, 'rpa');
                logToSimConsole(`[RPA] Guardando metadatos de ciudadano y radicado.`, 'rpa');
                logToSimConsole(`[RPA] Cargando archivo PDF y anexos...`, 'rpa');

                let progress = 0;
                const uploadInterval = setInterval(() => {
                    const bar = document.getElementById("simUploadBar");
                    const perc = document.getElementById("simUploadPerc");
                    
                    if (progress < 100) {
                        progress += 20;
                        if (bar) bar.style.width = progress + '%';
                        if (perc) perc.innerText = progress + '%';
                    } else {
                        clearInterval(uploadInterval);
                        
                        setTimeout(() => {
                            simStep = 5;
                            drawSimCanvas();
                            logToSimConsole(`[RPA] PDF cargado y radicado de forma exitosa.`, 'rpa');
                            logToSimConsole(`[RPA] Sincronización finalizada en la estructura de OneDrive.`, 'rpa');
                            logToSimConsole(`[SISTEMA] Radicación exitosa en 11.2 segundos. Flujo terminado sin error.`, 'ok');

                            const btnBox = document.getElementById("simActionContainer");
                            if (btnBox) {
                                btnBox.innerHTML = `
                                    <button onclick="resetSim()" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-200 font-bold text-xs p-3 rounded-xl flex items-center justify-center gap-1.5 transition-all">
                                        ↻ Reiniciar Simulador
                                    </button>
                                `;
                            }
                        }, 500);
                    }
                }, 150);

            }, 1500);
        }

        function resetSim() {
            simStep = 0;
            mfaApproved = false;
            simLogs = [];
            drawSimCanvas();
            document.getElementById("simLogs").innerHTML = `<span class="text-slate-650 italic block text-center pt-24">Consola inactiva.</span>`;
            
            const btnBox = document.getElementById("simActionContainer");
            if (btnBox) {
                btnBox.innerHTML = `
                    <button onclick="runSimulation()" class="w-full bg-sena-green text-white hover:bg-emerald-600 font-black text-xs p-3 rounded-xl shadow-lg shadow-sena-green/10 flex items-center justify-center gap-1.5 transition-all">
                        ▶ Iniciar Simulación
                    </button>
                `;
            }
        }

        // --- KEYBOARD & NAVIGATION CONTROLLER ---
        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowRight" || e.key === "PageDown" || e.key === "Space") {
                e.preventDefault();
                nextSlide();
            } else if (e.key === "ArrowLeft" || e.key === "PageUp") {
                e.preventDefault();
                prevSlide();
            } else if (e.key.toLowerCase() === "n") {
                e.preventDefault();
                toggleNotes();
            }
        });

        window.onload = () => {
            // Check for notes true parameter to open speaker notes by default
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('notes') === 'true') {
                showPresenterNotes = true;
                const drawer = document.getElementById("notesDrawer");
                if (drawer) drawer.classList.remove("translate-x-full");
                const btnText = document.getElementById("notesBtnText");
                if (btnText) btnText.innerText = "Ocultar Notas";
            }
            renderSlide();
        };
    </script>
</body>
</html>
