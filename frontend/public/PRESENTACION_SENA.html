<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENA V2 - Hiperautomatización con IA y RPA</title>
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        sena: {
                            green: '#39A900',
                            dark: '#0B2F00',
                            glow: 'rgba(57, 169, 0, 0.4)',
                        },
                        darkbg: '#050811',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #03060d;
            color: #e2e8f0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        
        /* Glassmorphism panel styling */
        .glass-panel {
            background: rgba(10, 17, 34, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
        }
        
        .glass-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card:hover {
            border-color: rgba(57, 169, 0, 0.25);
            background: rgba(15, 23, 42, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(57, 169, 0, 0.05);
        }
        
        /* Laser scanner animation */
        @keyframes laser-move {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
        .laser-line {
            animation: laser-move 2.5s ease-in-out infinite;
        }

        /* Pulsing background glows */
        @keyframes drift {
            0%, 100% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }
        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
            animation: drift 15s ease-in-out infinite;
        }

        /* Blinking cursor */
        @keyframes cursor-blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
        .caret-blink {
            animation: cursor-blink 0.9s infinite;
        }

        /* Slide element enter animations */
        .slide-enter-active {
            animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .stagger-1 { animation-delay: 100ms; }
        .stagger-2 { animation-delay: 200ms; }
        .stagger-3 { animation-delay: 300ms; }
        .stagger-4 { animation-delay: 400ms; }
        .stagger-5 { animation-delay: 500ms; }

        .custom-scroll::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(57,169,0,0.3);
        }

        /* Micro animations */
        .glow-hover:hover {
            box-shadow: 0 0 20px rgba(57, 169, 0, 0.4);
        }
        
        /* Vibrating phone animation */
        @keyframes vibrate {
            0%, 100% { transform: rotate(0deg); }
            10%, 30%, 50%, 70%, 90% { transform: rotate(-2deg); }
            20%, 40%, 60%, 80% { transform: rotate(2deg); }
        }
        .phone-vibrate {
            animation: vibrate 0.5s linear infinite;
        }
    </style>
</head>
<body class="antialiased overflow-hidden select-none">

    <!-- PULSING BACKGROUND NEON GLOWS -->

                    </svg>

        </header>

        <!-- PRESENTATION SCREEN CONTAINER -->
        <main class="flex-grow flex items-center justify-center py-4 relative">

            </div>
        </main>

        <!-- FLOATING CONTROL DOCK -->
        <footer class="flex justify-between items-center border-t border-white/5 pt-3">
            <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest font-outfit">
                Estrategia 180 / SENA
            </div>

            <!-- Diapositivas Progress Buttons -->
            <div class="flex items-center gap-4 bg-slate-950/80 border border-white/10 px-5 py-2 rounded-full shadow-2xl">
                <button onclick="prevSlide()" class="p-1.5 text-slate-400 hover:text-white disabled:opacity-20 transition-all" id="prevBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" /></svg>
                </button>

                <button onclick="nextSlide()" class="p-1.5 text-slate-400 hover:text-white disabled:opacity-20 transition-all" id="nextBtn">

            <div class="p-4 border-b border-white/10 flex justify-between items-center bg-slate-900/60">
                <div class="flex items-center gap-2">
                    <span class="text-sena-green">💡</span>
                    <h3 class="text-xs font-black font-outfit text-white uppercase tracking-wider">Notas de Apoyo al Expositor</h3>
                </div>
                <button onclick="toggleNotes()" class="p-1 text-slate-500 hover:text-white rounded-lg hover:bg-white/5 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div id="notesContent" class="flex-grow p-5 overflow-y-auto text-xs text-slate-300 leading-relaxed font-medium space-y-4 custom-scroll">
                <!-- Speaker Notes dynamically written here -->
            </div>
            <div class="p-3 border-t border-white/5 bg-slate-900/30 text-[9px] text-slate-500 text-center font-semibold uppercase tracking-wider">
                Tip: Teclas [←] y [→] navegan. Tecla [N] abre/cierra las notas.
            </div>
        </div>
    </div>

    <!-- MAIN SLIDE DATABASE -->
    <script>

                            <div class="w-32 h-52 bg-slate-900 border border-white/20 rounded-2xl p-2.5 relative shadow-2xl flex flex-col justify-between ${!mfaApproved ? 'phone-vibrate' : ''}">
                                <div class="w-8 h-2.5 bg-slate-950 rounded-full mx-auto mb-1"></div>
                                
                                <div class="bg-slate-950 border border-white/5 rounded-xl p-2 flex-grow flex flex-col justify-between text-center space-y-2 text-[8px]">
                                    <div class="space-y-1">
                                        <span class="bg-yellow-500/10 text-yellow-400 border border-yellow-500/20 px-1 py-0.5 rounded-full font-bold uppercase text-[6px]">Seguridad</span>
                                        <span class="block font-black text-slate-300">¿Aprobar Acceso RPA?</span>
                                        <span class="block text-[6px] text-slate-500 font-bold">Ip: 192.168.1.15</span>
                                    </div>
                                    
                                    ${!mfaApproved ? `
                                        <button onclick="approveSimMfa()" class="bg-sena-green hover:bg-emerald-600 text-white font-black py-1 px-2 rounded-lg cursor-pointer transition-all active:scale-95 text-[8px]">
                                            ✓ APROBAR LOGIN
                                        </button>
                                    ` : `
                                        <div class="bg-emerald-950/30 border border-emerald-500/20 text-emerald-400 font-black py-1 rounded-lg">
                                            ✓ AUTORIZADO
                                        </div>
                                    `}
                                </div>
                            </div>

                        </div>
                        <span class="block text-[9px] text-yellow-400 font-bold animate-pulse mt-4 text-center">
                            ${!mfaApproved ? 'HAGA CLIC EN "APROBAR LOGIN" EN EL CELULAR DE ARRIBA' : 'MFA verificado de forma exitosa...'}
                        </span>
                    </div>
                `;
                document.getElementById("simGlowLed").className = "w-2.5 h-2.5 rounded-full bg-yellow-500 animate-pulse";
            }
            else if (simStep === 4) {
                // RPA typing into ECM form
                canvas.innerHTML = `
                    <div class="w-full h-full flex flex-col justify-center items-center p-3 animate-fade-in">
                        <div class="w-full bg-slate-900 border border-white/10 rounded-xl p-3 shadow-2xl text-[8px] space-y-2">
                            <div class="bg-slate-950 border-b border-white/5 p-1 flex justify-between items-center font-mono text-[7px]">
                                <span class="text-slate-400 font-bold">ECM GESTOR DOCUMENTAL INSTITUCIONAL</span>
                                <span class="text-cyan-400 font-bold blink">ESCRIBIENDO...</span>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-2 text-left font-mono">
                                <div>
                                    <span class="text-[7px] text-slate-500 block font-bold">EXPEDIENTE:</span>
                                    <div class="bg-slate-950 border border-white/5 p-1 rounded font-bold text-slate-350">${doc.expediente}</div>
                                </div>
                                <div>
                                    <span class="text-[7px] text-slate-500 block font-bold">TIPOLOGÍA:</span>
                                    <div class="bg-slate-950 border border-sena-green/30 p-1 rounded font-bold text-sena-green">${doc.type}</div>
                                </div>
                                <div>
                                    <span class="text-[7px] text-slate-500 block font-bold">TITULAR/CIUDADANO:</span>
                                    <div class="bg-slate-950 border border-white/5 p-1 rounded font-bold text-slate-350 truncate">${doc.solicitante}</div>
                                </div>
                                <div>
                                    <span class="text-[7px] text-slate-500 block font-bold">CÉDULA/NIT:</span>
                                    <div class="bg-slate-950 border border-white/5 p-1 rounded font-bold text-slate-350">${doc.cedula}</div>
                                </div>
                            </div>
                            
                            <div class="space-y-1 border-t border-white/5 pt-2 text-left">
                                <div class="flex justify-between text-[7px] text-slate-400 font-bold">
                                    <span>Cargando PDF: ${doc.title}</span>
                                    <span id="simUploadPerc">0%</span>
                                </div>
                                <div class="w-full bg-slate-950 h-1 rounded-full overflow-hidden">
                                    <div class="bg-sena-green h-full w-0 transition-all duration-100" id="simUploadBar"></div>
                                </div>
                            </div>
                        </div>
                        <span class="block text-[9px] text-cyan-400 mt-2 font-bold uppercase tracking-wider">Robot RPA ingresando datos y cargando documento...</span>
                    </div>
                `;
                document.getElementById("simGlowLed").className = "w-2.5 h-2.5 rounded-full bg-cyan-400 animate-pulse";
            }
            else if (simStep === 5) {
                // Done successfully
                canvas.innerHTML = `
                    <div class="w-full h-full flex flex-col justify-center items-center space-y-3 p-4 animate-fade-in">
                        <div class="w-12 h-12 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 flex items-center justify-center text-xl shadow-lg shadow-emerald-500/5">✓</div>
                        <h5 class="text-sm font-black text-emerald-400 font-outfit uppercase">Radicado con Éxito</h5>
                        
                        <div class="bg-slate-900 border border-white/5 rounded-xl p-3 text-left w-full text-[9px] space-y-1 leading-relaxed">
                            <span class="text-sena-green font-bold uppercase block tracking-wider">Resumen IA (Gemini):</span>
                            <p class="text-slate-400 font-medium font-mono">"${doc.type} radicado en expediente ${doc.expediente} correspondiente a ${doc.solicitante} con documento ${doc.cedula}. Transcripción indexada con 0% de errores de digitación."</p>
                        </div>
                    </div>
                `;
                document.getElementById("simGlowLed").className = "w-2.5 h-2.5 rounded-full bg-emerald-400";
            }
        }

        function runSimulation() {
            if (simStep > 0) return; // Prevent double trigger
            
            const doc = MOCK_DOCS[selectedSimDocId];
            simLogs = [];
            simStep = 1;
            drawSimCanvas();

            // Action triggers & timing sequence
            logToSimConsole(`[IA] Iniciando escaneo de documento: ${doc.title}...`, 'ia');
            logToSimConsole(`[IA] Extrayendo estructura semántica y caracteres multimodales...`, 'ia');

            setTimeout(() => {
                // Scan success, proceed to SSO Login
                simStep = 2;
                drawSimCanvas();
                logToSimConsole(`[IA] Clasificación propuesta: ${doc.type} (Confianza: ${doc.confidence})`, 'ia');
                logToSimConsole(`[IA] Datos deducidos: Titular="${doc.solicitante}", Id="${doc.cedula}"`, 'ia');
                logToSimConsole(`[RPA] Iniciando robot. Abriendo navegador institucional...`, 'rpa');
                logToSimConsole(`[RPA] Redireccionado a inicio de sesión único (Microsoft SSO).`, 'rpa');

                // Simulate typing credentials
                typeEmailAndPass();
            }, 2500);
        }

        function typeEmailAndPass() {
            const email = 'orador.sena@sena.edu.co';
            const pass = 'HiperAutomatizacion2026*';
            
            const emailBox = document.getElementById("simEmailBox");
            const passBox = document.getElementById("simPassBox");
            
            let i = 0;
            const emailInterval = setInterval(() => {
                if (i < email.length) {
                    if (emailBox) emailBox.innerText = email.substring(0, i + 1) + '|';
                    i++;
                } else {
                    clearInterval(emailInterval);
                    if (emailBox) emailBox.innerText = email; // Remove cursor character
                    
                    logToSimConsole(`[RPA] Digitando contraseña segura corporativa...`, 'rpa');
                    let j = 0;
                    const passInterval = setInterval(() => {
                        if (j < pass.length) {
                            if (passBox) passBox.innerText = '*'.repeat(j + 1) + '|';
                            j++;
                        } else {
                            clearInterval(passInterval);
                            if (passBox) passBox.innerText = '*'.repeat(pass.length);
                            
                            // SSO validation proceeds to MFA challenge
                            setTimeout(() => {
                                simStep = 3;
                                mfaApproved = false;
                                drawSimCanvas();
                                logToSimConsole(`[SEGURIDAD] Autenticación bloqueada por MFA corporativo.`, 'mfa');
                                logToSimConsole(`[SEGURIDAD] Esperando aprobación manual en celular del expositor...`, 'mfa');
                            }, 600);
                        }
                    }, 30);
                }
            }, 30);
        }

        function approveSimMfa() {
            mfaApproved = true;
            drawSimCanvas();
            logToSimConsole(`[SEGURIDAD] Acceso autorizado en celular. Credencial validada.`, 'ok');
            logToSimConsole(`[RPA] Login exitoso. Navegando al módulo de radicación del ECM...`, 'rpa');

            setTimeout(() => {
                // Proceed to RPA data entry
                simStep = 4;
                drawSimCanvas();
                logToSimConsole(`[RPA] Buscando expediente: ${MOCK_DOCS[selectedSimDocId].expediente}`, 'rpa');
                logToSimConsole(`[RPA] Escribiendo metadato: Titular -> ${MOCK_DOCS[selectedSimDocId].solicitante}`, 'rpa');
                logToSimConsole(`[RPA] Escribiendo metadato: Cédula -> ${MOCK_DOCS[selectedSimDocId].cedula}`, 'rpa');
                logToSimConsole(`[RPA] Seleccionando tipología TRD -> ${MOCK_DOCS[selectedSimDocId].type}`, 'rpa');
                logToSimConsole(`[RPA] Adjuntando y cargando archivo PDF...`, 'rpa');

                // Sim progress bar upload
                let progress = 0;
                const uploadInterval = setInterval(() => {
                    const bar = document.getElementById("simUploadBar");
                    const perc = document.getElementById("simUploadPerc");
                    
                    if (progress < 100) {
                        progress += 10;
                        if (bar) bar.style.width = progress + '%';
                        if (perc) perc.innerText = progress + '%';
                    } else {
                        clearInterval(uploadInterval);
                        
                        // Final step success
                        setTimeout(() => {
                            simStep = 5;
                            drawSimCanvas();
                            logToSimConsole(`[RPA] Carga de documento terminada con éxito.`, 'rpa');
                            logToSimConsole(`[RPA] Archivo guardado simétricamente en OneDrive institucional.`, 'rpa');
                            logToSimConsole(`[SISTEMA] Radicación exitosa. Flujo terminado en 12.8 segundos.`, 'ok');

                            // Reset button to allow restart
                            const btnBox = document.getElementById("simActionContainer");
                            if (btnBox) {
                                btnBox.innerHTML = `
                                    <button onclick="resetSim()" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-200 font-bold text-xs p-3 rounded-xl flex items-center justify-center gap-1.5 transition-all">
                                        ↻ Reiniciar Simulador
                                    </button>
                                `;
                            }
                        }, 500);
                    }
                }, 100);

            }, 1500);
        }

        function resetSim() {
            simStep = 0;
            mfaApproved = false;
            simLogs = [];
            drawSimCanvas();
            document.getElementById("simLogs").innerHTML = `<span class="text-slate-600 italic block text-center pt-24">Consola inactiva.</span>`;
            
            const btnBox = document.getElementById("simActionContainer");
            if (btnBox) {
                btnBox.innerHTML = `
                    <button onclick="runSimulation()" class="w-full bg-sena-green text-white hover:bg-emerald-600 font-black text-xs p-3 rounded-xl shadow-lg shadow-sena-green/10 flex items-center justify-center gap-1.5 transition-all">
                        ▶ Iniciar Simulación
                    </button>
                `;
            }
        }

        // --- KEYBOARD & MOUSE NAVIGATION CONTROLLERS ---
        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowRight") {
                e.preventDefault();
                nextSlide();
            } else if (e.key === "ArrowLeft") {
                e.preventDefault();
                prevSlide();
            } else if (e.key.toLowerCase() === "n") {
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('notes') === 'true') {
                    e.preventDefault();
                    toggleNotes();
                }
            }
        });

        // Initialize presentation on load
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const notesParam = urlParams.get('notes');
            const toggleBtn = document.getElementById("notesToggleBtn");
            if (notesParam === 'true') {
                showPresenterNotes = true;
                const drawer = document.getElementById("notesDrawer");
                if (drawer) drawer.classList.remove("translate-x-full");
                const btnText = document.getElementById("notesBtnText");
                if (btnText) btnText.innerText = "Ocultar Notas";
                if (toggleBtn) toggleBtn.style.display = "";
            } else {
                showPresenterNotes = false;
                const drawer = document.getElementById("notesDrawer");
                if (drawer) drawer.classList.add("translate-x-full");
                const btnText = document.getElementById("notesBtnText");
                if (btnText) btnText.innerText = "Ver Notas";
                if (toggleBtn) toggleBtn.style.display = "none";
            }
            renderSlide();
        };
    </script>
</body>
</html>
