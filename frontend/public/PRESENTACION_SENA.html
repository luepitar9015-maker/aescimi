                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen();
                } else if (elem.msRequestFullscreen) {
                    elem.msRequestFullscreen();

            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();

                    document.webkitExitFullscreen();

        // --- INTERACTIVE CALCULATOR ENGINE (Slide 4) ---
        function updateCalculator() {
            const docsInput = document.getElementById("slideDocs");
            const minManualInput = document.getElementById("valMinManual");
            const secRobotInput = document.getElementById("valSecRobot");
            
            if (!docsInput) return; // Not on slide 4

            const docs = parseInt(docsInput.value);
            document.getElementById("valDocs").innerText = docs;

            const minManual = parseFloat(minManualInput.value) || 4;
            const secRobot = parseFloat(secRobotInput.value) || 15;

            // Calculations
            const manualHours = (docs * minManual) / 60;
            const robotHours = (docs * secRobot) / 3600;
            const savedHours = manualHours - robotHours;
            const savedDays = (savedHours * 20) / 8; // 20 working days, 8hr shift
            const relativeSpeed = Math.round((minManual * 60) / secRobot);

            // Print
            document.getElementById("resManual").innerText = manualHours.toFixed(1) + "h";
            document.getElementById("resRobot").innerText = (robotHours * 60).toFixed(1) + "m";
            document.getElementById("resSpeed").innerText = relativeSpeed + "x";
            document.getElementById("resSavedHours").innerText = savedHours.toFixed(1) + " horas";
            document.getElementById("resSavedDays").innerText = savedDays.toFixed(1) + " dĂ­as";

            // Bar Chart Updates
            const barManualVal = document.getElementById("barManualVal");
            const barRobotVal = document.getElementById("barRobotVal");
            const barRobotWidth = document.getElementById("barRobotWidth");
            
            if (barManualVal) barManualVal.innerText = minManual + " mins";
            if (barRobotVal) barRobotVal.innerText = secRobot + " secs";
            if (barRobotWidth) {
                const manualSec = minManual * 60;
                const robotRatio = Math.min((secRobot / manualSec) * 100, 100);
                barRobotWidth.style.width = robotRatio.toFixed(1) + "%";
            }
        }

                btnBox.innerHTML = `
                    <button onclick="runSimulation()" class="w-full bg-sena-green text-white hover:bg-emerald-600 font-black text-xs p-3 rounded-xl shadow-lg shadow-sena-green/10 flex items-center justify-center gap-1.5 transition-all">
                        â¶ Iniciar SimulaciĂłn
                    </button>
                `;
            }
        }

        // --- KEYBOARD & MOUSE NAVIGATION CONTROLLERS ---
        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowRight") {
                e.preventDefault();
                nextSlide();
            } else if (e.key === "ArrowLeft") {
                e.preventDefault();
                prevSlide();
            } else if (e.key.toLowerCase() === "n") {
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('notes') === 'true') {
                    e.preventDefault();
                    toggleNotes();
                }
            }
        });

        // Initialize presentation on load
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const notesParam = urlParams.get('notes');
            const toggleBtn = document.getElementById("notesToggleBtn");
            if (notesParam === 'true') {
                showPresenterNotes = true;
                const drawer = document.getElementById("notesDrawer");
                if (drawer) drawer.classList.remove("translate-x-full");
                const btnText = document.getElementById("notesBtnText");
                if (btnText) btnText.innerText = "Ocultar Notas";
                if (toggleBtn) toggleBtn.style.display = "";
            } else {
                showPresenterNotes = false;
                const drawer = document.getElementById("notesDrawer");
                if (drawer) drawer.classList.add("translate-x-full");
                const btnText = document.getElementById("notesBtnText");
                if (btnText) btnText.innerText = "Ver Notas";
                if (toggleBtn) toggleBtn.style.display = "none";
            }
            renderSlide();
        };
    </script>
</body>
</html>
