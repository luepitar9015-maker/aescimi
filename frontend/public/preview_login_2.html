<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propuesta 2 — Glassmorphism Oscuro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0f2820 0%, #0d3319 30%, #1a5c00 60%, #0a2010 100%);
    position: relative; overflow: hidden;
  }

  /* Orbes decorativos */
  .orb { position: absolute; border-radius: 50%; filter: blur(80px); }
  .orb1 { width: 500px; height: 500px; top: -150px; right: -100px; background: rgba(57,169,0,0.2); }
  .orb2 { width: 400px; height: 400px; bottom: -100px; left: -80px; background: rgba(20,80,0,0.25); }
  .orb3 { width: 300px; height: 300px; top: 30%; left: 20%; background: rgba(0,150,50,0.12); }

  /* Partículas */
  .particles { position: absolute; inset: 0; overflow: hidden; }
  .dot { position: absolute; width: 3px; height: 3px; background: rgba(255,255,255,0.15); border-radius: 50%; animation: float linear infinite; }
  @keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100px) scale(1); opacity: 0; }
  }

  .container { position: relative; z-index: 10; width: 100%; max-width: 440px; padding: 24px; }

  /* Tarjeta glass */
  .glass {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.13);
    border-radius: 24px;
    padding: 44px 40px;
    box-shadow: 0 25px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .brand-top { text-align: center; margin-bottom: 32px; }
  .brand-icon-wrap {
    width: 68px; height: 68px; margin: 0 auto 16px;
    background: linear-gradient(135deg, rgba(57,169,0,0.4), rgba(57,169,0,0.15));
    border: 1px solid rgba(57,169,0,0.4); border-radius: 18px;
    display: flex; align-items: center; justify-content: center; font-size: 30px;
    box-shadow: 0 0 30px rgba(57,169,0,0.2);
  }
  .tag {
    font-size: 10px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: rgba(57,169,0,0.9); margin-bottom: 8px;
  }
  .title { font-size: 22px; font-weight: 800; color: #ffffff; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: rgba(255,255,255,0.45); }

  .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 24px 0; }

  .field { margin-bottom: 18px; }
  label { display: block; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.6); margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
  input {
    width: 100%; padding: 13px 16px; font-size: 14px; font-family: 'Inter', sans-serif;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; outline: none; color: white;
    transition: all 0.25s;
  }
  input::placeholder { color: rgba(255,255,255,0.3); }
  input:focus { border-color: rgba(57,169,0,0.6); background: rgba(255,255,255,0.11); box-shadow: 0 0 0 3px rgba(57,169,0,0.15); }
  .pw-wrap { position: relative; }
  .pw-wrap input { padding-right: 48px; }
  .eye { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 18px; }

  .btn {
    width: 100%; padding: 14px; font-size: 15px; font-weight: 700; font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #39A900, #2a7d00);
    color: white; border: none; border-radius: 12px; cursor: pointer; margin-top: 8px;
    box-shadow: 0 4px 20px rgba(57,169,0,0.4), 0 0 40px rgba(57,169,0,0.1);
    transition: all 0.2s; text-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(57,169,0,0.5); }

  .footer { text-align: center; margin-top: 24px; font-size: 11px; color: rgba(255,255,255,0.25); }
</style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <!-- Partículas -->
  <div class="particles">
    <div class="dot" style="left:10%; animation-delay:0s; animation-duration:8s;"></div>
    <div class="dot" style="left:25%; animation-delay:2s; animation-duration:12s; width:2px; height:2px;"></div>
    <div class="dot" style="left:50%; animation-delay:4s; animation-duration:9s;"></div>
    <div class="dot" style="left:70%; animation-delay:1s; animation-duration:11s; width:4px; height:4px;"></div>
    <div class="dot" style="left:85%; animation-delay:3s; animation-duration:7s;"></div>
    <div class="dot" style="left:40%; animation-delay:5s; animation-duration:10s;"></div>
  </div>

  <div class="container">
    <div class="glass">
      <div class="brand-top">
        <div class="brand-icon-wrap">📄</div>
        <p class="tag">Gestión Documental Inteligente</p>
        <h1 class="title">Automatizador de Gestión Documental</h1>
        <p class="subtitle">Acceso al sistema institucional</p>
      </div>

      <div class="divider"></div>

      <div class="field">
        <label>No. Consumo (Usuario)</label>
        <input type="text" placeholder="Ingrese su número de documento">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <div class="pw-wrap">
          <input type="password" placeholder="Ingrese su contraseña">
          <button class="eye">👁️</button>
        </div>
      </div>

      <button class="btn">✦ Ingresar al Sistema</button>
      <p class="footer">Sistema de uso institucional — Acceso restringido</p>
    </div>
  </div>
</body>
</html>
