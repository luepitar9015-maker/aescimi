<!DOCTYPE html>
<html lang="es">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],

    <style>
        body {
            background-color: #070a10;
            color: #f3f4f6;
            overflow: hidden;
        }

        }
        .glass-card {
            background: rgba(15, 22, 38, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
        /* Custom scrollbar for presenter notes */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);

        }

            background: rgba(255,255,255,0.3);

            background: linear-gradient(-45deg, #39a900, #06b6d4, #4f46e5, #00c6ff);

</head>
<body class="font-sans antialiased">

        let currentIdx = 0;
        let showPresenterNotes = false;

        // Load specific video helper
        function handleVideoUpload(event, videoElementId) {
            const file = event.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                const video = document.getElementById(videoElementId);
                video.src = url;
                video.classList.remove('hidden');
                event.target.parentElement.classList.add('hidden');
            }
        }

            const container = document.getElementById("slideContent");

            container.style.transform = "scale(0.98)";

                            <div class="text-center space-y-2">
                                <h2 class="text-4xl font-extrabold font-outfit text-white tracking-tight">${slide.title}</h2>

                            </div>
                        </div>
                    `;
                } else if (slide.type === "proposal") {
                    html = `
                        <div class="w-full space-y-6 slide-container">
                            <div class="text-center space-y-2">
                                <h2 class="text-4xl font-extrabold font-outfit text-white tracking-tight">${slide.title}</h2>
                                <p class="text-sm font-semibold text-cyan-400 tracking-wide uppercase font-outfit">${slide.subtitle}</p>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 pt-6">
                                ${slide.pillars.map((pi, idx) => `
                                    <div class="glass-card p-6 rounded-2xl flex flex-col justify-between hover:border-sena-green/30 transition-all hover:-translate-y-1 duration-300">
                                        <div class="space-y-4">
                                            <div class="w-10 h-10 rounded-full bg-sena-green/10 border border-sena-green/20 text-sena-green flex items-center justify-center text-lg shadow-inner">
                                                ${pi.icon}
                                            </div>
                                            <h4 class="text-lg font-bold text-white font-outfit">${pi.title}</h4>
                                            <p class="text-xs text-gray-400 leading-relaxed font-light">${pi.desc}</p>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                } else if (slide.type === "video_comparison") {
                    html = `
                        <div class="w-full space-y-4 slide-container">
                            <div class="text-center space-y-1">
                                <h2 class="text-3xl font-extrabold font-outfit text-white tracking-tight">${slide.title}</h2>
                                <p class="text-xs font-semibold text-cyan-400 tracking-wide uppercase font-outfit">${slide.subtitle}</p>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4">
                                <!-- BEFORE / MANUAL -->
                                <div class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center relative overflow-hidden" style="height: 320px;">
                                    <h4 class="absolute top-4 left-4 text-xs font-bold font-outfit text-red-400 tracking-wider uppercase px-2 py-0.5 bg-red-500/10 border border-red-500/20 rounded">Antes: Proceso Manual (10 mins)</h4>
                                    
                                    <video id="videoBefore" class="w-full h-full object-cover rounded-lg hidden" controls loop></video>
                                    
                                    <label class="flex flex-col items-center justify-center p-6 border-2 border-dashed border-white/10 hover:border-red-500/40 rounded-xl cursor-pointer hover:bg-white/5 transition-all text-center">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-gray-500 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                                        <span class="text-xs font-medium text-gray-300">Cargar Vídeo Manual (.mp4)</span>
                                        <input type="file" class="hidden" accept="video/mp4" onchange="handleVideoUpload(event, 'videoBefore')">
                                    </label>
                                </div>
                                <!-- AFTER / AUTOMATOR -->
                                <div class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center relative overflow-hidden" style="height: 320px;">
                                    <h4 class="absolute top-4 left-4 text-xs font-bold font-outfit text-emerald-400 tracking-wider uppercase px-2 py-0.5 bg-emerald-500/10 border border-emerald-500/20 rounded">Después: Automatizado (15 segs)</h4>
                                    
                                    <video id="videoAfter" class="w-full h-full object-cover rounded-lg hidden" controls loop></video>
                                    
                                    <label class="flex flex-col items-center justify-center p-6 border-2 border-dashed border-white/10 hover:border-emerald-500/40 rounded-xl cursor-pointer hover:bg-white/5 transition-all text-center">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-gray-500 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                                        <span class="text-xs font-medium text-gray-300">Cargar Vídeo Automatizado (.mp4)</span>
                                        <input type="file" class="hidden" accept="video/mp4" onchange="handleVideoUpload(event, 'videoAfter')">
                                    </label>
                                </div>
                            </div>
                        </div>
                    `;
                } else if (slide.type === "tech_stack") {
                    html = `
                        <div class="w-full space-y-6 slide-container">
                            <div class="text-center space-y-2">
                                <h2 class="text-4xl font-extrabold font-outfit text-white tracking-tight">${slide.title}</h2>
                                <p class="text-sm font-semibold text-cyan-400 tracking-wide uppercase font-outfit">${slide.subtitle}</p>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 pt-6">
                                ${slide.points.map((p, idx) => `
                                    <div class="glass-card p-6 rounded-2xl space-y-3 hover:border-cyan-500/30 transition-all duration-300">
                                        <span class="text-xs font-bold font-outfit text-sena-green uppercase px-2 py-0.5 bg-sena-green/10 border border-sena-green/20 rounded-full">${p.label}</span>
                                        <p class="text-xs text-gray-400 leading-relaxed font-light pt-2">${p.val}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                } else if (slide.type === "ocr_features") {
                    html = `
                        <div class="w-full space-y-6 slide-container">
                            <div class="text-center space-y-2">
                                <h2 class="text-4xl font-extrabold font-outfit text-white tracking-tight">${slide.title}</h2>
                                <p class="text-sm font-semibold text-cyan-400 tracking-wide uppercase font-outfit">${slide.subtitle}</p>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 pt-6">
                                ${slide.features.map(f => `
                                    <div class="glass-card p-6 rounded-2xl space-y-3 hover:border-sena-green/30 transition-all duration-300">
                                        <h4 class="text-lg font-bold text-white font-outfit flex items-center gap-1.5">
                                            <span class="w-1.5 h-1.5 bg-sena-green rounded-full"></span>
                                            ${f.title}
                                        </h4>
                                        <p class="text-xs text-gray-400 leading-relaxed font-light">${f.desc}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                } else if (slide.type === "onedrive_structure") {
                    html = `
                        <div class="w-full space-y-6 slide-container">
                            <div class="text-center space-y-2">
                                <h2 class="text-4xl font-extrabold font-outfit text-white tracking-tight">${slide.title}</h2>
                                <p class="text-sm font-semibold text-cyan-400 tracking-wide uppercase font-outfit">${slide.subtitle}</p>
                            </div>
                            <div class="max-w-2xl mx-auto space-y-4 pt-6">
                                ${slide.bullets.map((b, idx) => `
                                    <div class="glass-card p-4 rounded-xl flex items-start gap-4 hover:border-sena-green/20 transition-all duration-300">
                                        <div class="w-6 h-6 rounded-full bg-sena-green/10 border border-sena-green/20 text-sena-green font-bold text-xs flex items-center justify-center flex-shrink-0 mt-0.5">
                                            ${idx+1}
                                        </div>
                                        <p class="text-xs text-gray-300 leading-relaxed font-light">${b}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                } else if (slide.type === "roi") {
                    html = `
                        <div class="w-full space-y-6 slide-container">
                            <div class="text-center space-y-2">
                                <h2 class="text-4xl font-extrabold font-outfit text-white tracking-tight">${slide.title}</h2>
                                <p class="text-sm font-semibold text-cyan-400 tracking-wide uppercase font-outfit">${slide.subtitle}</p>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 pt-8">
                                ${slide.stats.map(s => `
                                    <div class="glass-card p-6 rounded-2xl text-center space-y-2 hover:border-sena-green/30 transition-all duration-300">
                                        <div class="text-6xl font-black font-outfit text-transparent bg-clip-text bg-gradient-to-r from-sena-green to-emerald-400">${s.value}</div>
                                        <p class="text-xs text-gray-400 leading-relaxed font-light">${s.desc}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                } else if (slide.type === "conclusion") {
                    html = `
                        <div class="text-center space-y-8 slide-container max-w-3xl">
                            <h2 class="text-5xl font-extrabold font-outfit text-white tracking-tight leading-none">${slide.title}</h2>
                            <p class="text-sm font-semibold text-cyan-400 tracking-wide uppercase font-outfit">${slide.subtitle}</p>
                            
                            <div class="glass-card p-8 rounded-3xl border-sena-green/20 max-w-2xl mx-auto shadow-2xl relative overflow-hidden">
                                <div class="absolute w-24 h-24 rounded-full bg-sena-green/5 -bottom-12 -left-12 blur-md"></div>
                                <p class="text-lg text-gray-200 leading-relaxed font-light italic relative z-10">
                                    "${slide.message}"
                                </p>
                            </div>
                            
                            <div class="pt-6">
                                <span class="px-6 py-2.5 rounded-full bg-gradient-to-r from-sena-green to-cyan-500 text-white font-bold font-outfit text-xs tracking-wider shadow-lg hover:scale-105 transition-transform duration-200 uppercase">Muchas Gracias</span>
                            </div>
                        </div>
                    `;
                }
                
                container.innerHTML = html;
                
                // Fade-in animation
                container.style.opacity = 1;
                container.style.transform = "scale(1)";
                
                // Update indicator numbers
                document.getElementById("currentNum").innerText = currentIdx + 1;
                
                // Update progress bar
                const progressPercent = ((currentIdx + 1) / slides.length) * 100;
                document.getElementById("progressBar").style.width = `${progressPercent}%`;
                
                // Update notes side-drawer content
                document.getElementById("notesText").innerHTML = slide.notes;
            }, 200);
        }

        // Navigation functions
        function nextSlide() {
            if (currentIdx < slides.length - 1) {
                currentIdx++;
                renderSlide();
            }
        }
        function prevSlide() {
            if (currentIdx > 0) {
                currentIdx--;
                renderSlide();
            }
        }

        // Speaker notes display
        function toggleNotes() {
            showPresenterNotes = !showPresenterNotes;
            const drawer = document.getElementById("notesDrawer");
            if (showPresenterNotes) {
                drawer.classList.remove("translate-x-full");
            } else {
                drawer.classList.add("translate-x-full");
            }
        }

        // Document level keyboard listeners
        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowRight" || e.key === " ") {
                e.preventDefault();
                nextSlide();
            } else if (e.key === "ArrowLeft") {
                e.preventDefault();
                prevSlide();
            } else if (e.key.toLowerCase() === "n") {
                e.preventDefault();
                toggleNotes();
            }
        });

        // Initialize first slide on load
        window.onload = () => {
            document.getElementById("totalNum").innerText = slides.length;
            renderSlide();
        };
    </script>
</body>
</html>
